services:

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.24.1-alpine@sha256:432d730b97f375e5e34e9d48339d7dfe4a012f1db5d437067f7c91e4c1f35a66
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '10'
    restart: always
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - s-network

volumes:
  portainer_data:

networks:
  s-network:
    external: true
