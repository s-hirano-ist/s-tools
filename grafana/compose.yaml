services:

  grafana:
    image: grafana/grafana-enterprise:11.3.0@sha256:1283b133d3311bd31de9bb32adfab45e916e9ab6e472020d94a20324912bca80
    container_name: grafana
    restart: always
    networks:
      - s-network
    volumes:
      - 'grafana_data:/var/lib/grafana'

volumes:
  grafana_data:

networks:
  s-network:
    external: true
